name: Auto-Refresh Stalker Channels
on:
  schedule:
    - cron: '0 */2 * * *' # প্রতি ২ ঘণ্টা পর পর রান হবে
  workflow_dispatch: # ম্যানুয়ালি রান করার জন্য

permissions:
  contents: write # এই লাইনটি গিটহাবে ফাইল পুশ করার পারমিশন দেবে

jobs:
  run-updater:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests

      - name: Scrape Portal & Update JSON
        run: |
          python scan_channels.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          # 💡 [ফোর্স অ্যাড সলিউশন]: .gitignore-এর ব্লক এড়াতে -f ব্যবহার করা হচ্ছে
          git add -f channels.json
          git commit -m "Auto-update live sports channels" || exit 0
          git push
